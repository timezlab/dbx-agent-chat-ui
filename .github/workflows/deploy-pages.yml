name: Deploy Docs to GitHub Pages

on:
  push:
    branches:
      - main
    paths:
      - index.html
      - CNAME
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      # index.html is a self-contained build committed at the repo root
      # (produced by `pnpm build:docs`). CNAME carries the custom domain.
      - name: Stage site
        run: |
          mkdir -p _site
          cp index.html _site/index.html
          cp CNAME _site/CNAME

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
