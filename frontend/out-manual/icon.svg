<svg width="200" height="200" viewBox="0 0 200 200" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>


    <!-- Premium diagonal gradient for the Agent Chat Bubble -->
    <linearGradient id="blueCard" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#60A5FA" /> <!-- Brighter Sky Blue -->
      <stop offset="100%" stop-color="#2563EB" /> <!-- Vibrant Blue -->
    </linearGradient>
  </defs>

  <!-- 1. LAYER 1: THE CONTEXT DATA (Z-Axis Depth) -->
  <!-- A glassmorphic structural card representing the Lakehouse/Data context. Adapts to Light/Dark mode via opacity -->
  <rect x="16" y="16" width="126" height="126" rx="34" fill="#60A5FA" fill-opacity="0.15" />
  <rect x="16" y="16" width="126" height="126" rx="34" fill="none" stroke="#60A5FA" stroke-opacity="0.5" stroke-width="3" />
  
  <!-- Subtle Data/Document lines inside the Context Card -->
  <rect x="38" y="44" width="42" height="6" rx="3" fill="#60A5FA" fill-opacity="0.5" />
  <rect x="38" y="61" width="70" height="6" rx="3" fill="#60A5FA" fill-opacity="0.5" />
  <rect x="38" y="78" width="56" height="6" rx="3" fill="#60A5FA" fill-opacity="0.5" />

  <!-- 2. LAYER 2: THE AI AGENT (Z-Axis Elevated) -->
  <!-- A geometrically perfect Chat Bubble layered on top -->
  <g>
    <path d="
      M 92 58 
      L 150 58 
      A 34 34 0 0 1 184 92 
      L 184 150 
      A 34 34 0 0 1 150 184 
      L 58 184 
      L 58 92 
      A 34 34 0 0 1 92 58 
      Z" 
      fill="url(#blueCard)" 
    />
    <!-- Glassmorphic edge highlight (Double-bezel technique) -->
    <path d="
      M 92 58 
      L 150 58 
      A 34 34 0 0 1 184 92 
      L 184 150 
      A 34 34 0 0 1 150 184 
      L 58 184 
      L 58 92 
      A 34 34 0 0 1 92 58 
      Z" 
      fill="none" stroke="#FFFFFF" stroke-opacity="0.25" stroke-width="2" 
    />
  </g>

  <!-- 3. THE CORE INSIGHT: DATABRICKS SPARK -->
  <!-- A pure white geometric spark inside the Agent Bubble. -->
  <path d="
    M 121 86 
    Q 121 121 86 121 
    Q 121 121 121 156 
    Q 121 121 156 121 
    Q 121 121 121 86 
    Z" 
    fill="#FFFFFF" 
  />

</svg>
