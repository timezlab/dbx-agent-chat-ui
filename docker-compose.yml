name: dbx-agent-chat-ui

# UI-only app — a single Next.js `web` service, no backend (that's the whole point;
# see the constitution's "UI-Only, No Backend" principle). No host ports are
# published: the container is reached only over the shared external
# `timezlab_network`, where the `timezlab_cloudflared` tunnel routes to it by
# container name:
#   dbx-ui.timezlab.org -> http://dbx-ui:3000
#
# Add that public hostname in the Cloudflare Zero Trust dashboard (the tunnel is
# token-managed remotely, no local config.yml). Bring the tunnel up first:
#   docker compose -f ~/timezlab/cloudflared up -d

services:
  web:
    container_name: dbx-ui
    build:
      context: ./frontend
      dockerfile: Dockerfile
    env_file:
      - frontend/.env
    environment:
      # Non-secret endpoint selection only — these are the sole knobs that reach the
      # browser bundle. There are no transport "modes": the UI always streams from the
      # single Databricks-Playground-format endpoint below. Default = the same-origin
      # dev mock route `/api/chat` (served by `next dev` in this container; streams a
      # recorded response with zero Databricks access). Override with a real agent/proxy
      # URL for a live backend; set to empty for the "no endpoint" inline notice.
      # (Empty strings are coerced to undefined in src/env.ts.)
      # Trailing slash matches `trailingSlash: true` (avoids a 308 redirect on POST).
      NEXT_PUBLIC_CHAT_ENDPOINT_URL: ${NEXT_PUBLIC_CHAT_ENDPOINT_URL:-/api/chat/}
      # Optional host-provided REST endpoints (all independent; unset ⇒ local fallback).
      NEXT_PUBLIC_HISTORY_API_URL: ${NEXT_PUBLIC_HISTORY_API_URL:-}
      NEXT_PUBLIC_FEEDBACK_API_URL: ${NEXT_PUBLIC_FEEDBACK_API_URL:-}
      NEXT_PUBLIC_AGENTS_API_URL: ${NEXT_PUBLIC_AGENTS_API_URL:-}
      # Empty-state sample prompts: a JSON array of strings, e.g.
      # '["Summarize this doc","Write a SQL query"]'. Unset/malformed ⇒ no samples.
      NEXT_PUBLIC_SAMPLE_PROMPTS: ${NEXT_PUBLIC_SAMPLE_PROMPTS:-}
      # Show the composer's attach/upload button ("1"/"true"/"yes" ⇒ on). Default off.
      # Attachments ride along the chat body as base64 (T071); session-only (never
      # persisted). Tune the picker with the two knobs below.
      NEXT_PUBLIC_ENABLE_UPLOAD: ${NEXT_PUBLIC_ENABLE_UPLOAD:-}
      # File-picker accept list (comma-separated mime/ext, e.g. "image/*,application/pdf").
      # Unset/blank ⇒ images only.
      NEXT_PUBLIC_UPLOAD_ACCEPT: ${NEXT_PUBLIC_UPLOAD_ACCEPT:-}
      # Max size per attached file, in MB. Unset/invalid ⇒ built-in default (10 MB).
      NEXT_PUBLIC_UPLOAD_MAX_SIZE_MB: ${NEXT_PUBLIC_UPLOAD_MAX_SIZE_MB:-}
    # Resource ceiling for this container. `deploy.resources.limits` is honored by
    # `docker compose up` (Compose v2, non-swarm); `reservations` is a soft floor.
    # Sized for a single Next.js dev server on a shared host — override per-host via env
    # (e.g. WEB_MEM_LIMIT=2g) without editing this file. Raise the memory limit if the
    # container OOM-restarts during a cold compile.
    deploy:
      resources:
        limits:
          cpus: ${WEB_CPUS_LIMIT:-1.5}
          memory: ${WEB_MEM_LIMIT:-1g}
        reservations:
          cpus: ${WEB_CPUS_RESERVE:-0.25}
          memory: ${WEB_MEM_RESERVE:-256m}
    restart: unless-stopped
    networks:
      - timezlab_network

networks:
  # Shared network owned by the timezlab Cloudflare tunnel (timezlab_cloudflared).
  timezlab_network:
    external: true
